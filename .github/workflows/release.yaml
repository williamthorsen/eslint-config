# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: Release

on:
  workflow_dispatch:
    inputs:
      only:
        description: 'Components to release (comma-separated, leave empty for all)'
        required: false
        type: string
      bump:
        description: 'Override version bump type (leave empty to auto-detect)'
        required: false
        type: choice
        options:
          - ''
          - patch
          - minor
          - major

jobs:
  release:
    uses: williamthorsen/.github/.github/workflows/release-pnpm.yaml@v1
    with:
      node-version: '24'
      pnpm-version: '10.30.3'
      monorepo: true
      only: ${{ inputs.only }}
      bump: ${{ inputs.bump }}
